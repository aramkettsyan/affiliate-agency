name: Auto-publish & deploy affiliate site

on:
  push:
    branches: [main]          # deploy whenever the scheduled agent (or you) pushes
  workflow_dispatch:          # run on demand from the Actions tab
# NOTE: publishing/scheduling is handled by the local Claude scheduled agent
# "affiliate-auto-publish" (runs 3x/day, harvests + publishes + pushes).
# GitHub Actions here only BUILDS & DEPLOYS what gets pushed — no cron publishing.

permissions:
  contents: write             # allow committing newly published products back
  pages: write
  id-token: write

concurrency:
  group: publish-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Publish queued products ONLY on scheduled/manual runs — never on plain
      # pushes (so manual edits just rebuild/deploy and can't race the bot's commits).
      - name: Publish from queue
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python publish_from_queue.py

      - name: Generate site (rebuild all SEO + sitemap)
        run: python generate_site.py

      - name: Commit newly published products back
        run: |
          git config user.name "smart-picks-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-publish queued products + rebuild [skip ci]"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deploy
        uses: actions/deploy-pages@v4
